<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetMind DDS — Движение денежных средств</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  {% load static %}
  <link rel="stylesheet" href="{% static 'dds/css/styles.css' %}">
</head>
<body>
  <div class="app-container" id="app">

    <header class="titlebar">
      <div class="titlebar-left">
        <div class="titlebar-brand">
          <div class="titlebar-logo">
            <svg width="22" height="22" viewBox="0 0 128 128" fill="none" stroke="currentColor" stroke-width="1.5">
              <filter id="logoFilter">
                <feTurbulence type="turbulence" numOctaves="2" baseFrequency="0" result="turbulence"/>
                <feDisplacementMap in2="turbulence" in="SourceGraphic" scale="1" xChannelSelector="R" yChannelSelector="G"/>
              </filter>
              <polygon id="logoHexagon" points="64 128 8.574 96 8.574 32 64 0 119.426 32 119.426 96" fill="currentColor"/>
            </svg>
          </div>
          <span class="titlebar-title">NetMind DDS</span>
        </div>
      </div>
      <div class="titlebar-right">
        <span class="titlebar-subtitle">Движение денежных средств</span>
      </div>
    </header>

    <div class="app-body">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-inner">
          <div class="sidebar-top">
            <div class="sidebar-divider" style="margin:0 0 6px;opacity:0.3;"></div>

            <div class="nav-item" data-page="dashboard" data-label="Дашборд">
              <div class="nav-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="3" width="7" height="7" rx="1"/>
                  <rect x="14" y="3" width="7" height="7" rx="1"/>
                  <rect x="3" y="14" width="7" height="7" rx="1"/>
                  <rect x="14" y="14" width="7" height="7" rx="1"/>
                </svg>
              </div>
              <span class="nav-label">Дашборд</span>
            </div>

            <div class="nav-item active" data-page="records" data-label="Записи ДДС">
              <div class="nav-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                  <polyline points="14 2 14 8 20 8"/>
                  <line x1="16" y1="13" x2="8" y2="13"/>
                  <line x1="16" y1="17" x2="8" y2="17"/>
                  <line x1="10" y1="9" x2="8" y2="9"/>
                </svg>
              </div>
              <span class="nav-label">Записи ДДС</span>
            </div>

            <div class="nav-item" data-page="references" data-label="Справочники">
              <div class="nav-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                  <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                </svg>
              </div>
              <span class="nav-label">Справочники</span>
            </div>

          </div>

          <div class="sidebar-spacer"></div>

          <div class="sidebar-bottom">
            <div class="sidebar-divider"></div>
            <div class="user-profile">
              <div class="avatar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
              </div>
              <div class="user-info">
                <span class="username">Администратор</span>
                <span class="email">dds@netmind.ai</span>
              </div>
            </div>
          </div>
        </div>
      </aside>

      <main class="content" id="content">
      </main>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-content" id="modalContent"></div>
  </div>

  <script src="{% static 'dds/js/app.js' %}"></script>
</body>
</html>
